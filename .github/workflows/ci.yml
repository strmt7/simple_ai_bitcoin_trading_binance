name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-with-coverage:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: |
          python3 -m pip install -q -e .
          python3 -m pip install -q pytest coverage

      - name: Run tests with coverage
        run: |
          python3 -m coverage run --source=src/simple_ai_bitcoin_trading_binance -m pytest -q
          python3 -m coverage xml
          python3 -m coverage report --fail-under=100
          python3 -m coverage html

      - name: Upload HTML coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov

      - name: Upload coverage report to Codecov
        if: always() && github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
